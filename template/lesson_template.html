<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{lesson_code} — After-Class Review</title>
<style>

  /* ============================================================
     1. BASE
     ============================================================ */
  * {{ box-sizing: border-box; margin: 0; padding: 0; }}
  ul {{ list-style: none; }}

  body {{
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #f3f4f6;
    padding: 32px 24px;
    color: #1f2937;
  }}


  /* ============================================================
     2. CARD SHELL
     ============================================================ */
  .card {{
    width: 720px;
    max-width: 100%;
    margin: 0 auto;
    background: #ffffff;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
    page-break-after: always;
  }}


  /* ============================================================
     3. HEADER
     ============================================================ */
  .card-header {{
    background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
    color: #ffffff;
    padding: 24px 32px;
    position: relative;
  }}

  .card-meta {{
    font-size: 12px;
    letter-spacing: 0.1em;
    opacity: 0.8;
    margin-bottom: 8px;
    text-transform: uppercase;
    font-weight: 600;
  }}

  .card-title {{
    font-size: 26px;
    font-weight: 800;
    margin-bottom: 8px;
    line-height: 1.2;
  }}

  .card-goal {{
    font-size: 14px;
    background: rgba(255, 255, 255, 0.2);
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    backdrop-filter: blur(4px);
  }}

  .logo-img {{
    position: absolute;
    top: 24px;
    right: 32px;
    height: 32px;
  }}


  /* ============================================================
     4. SECTION SHELL
     ============================================================ */
  .section {{
    padding: 24px 32px;
    border-bottom: 1px solid #f3f4f6;
  }}

  .section:last-child {{ border-bottom: none; }}

  /* List items in plain <ul>: blank line between each */
  .section > ul:not([class]) > li {{
    margin-bottom: 20px;
  }}
  .section > ul:not([class]) > li:last-child {{
    margin-bottom: 0;
  }}

  .section-label {{
    display: flex;
    align-items: center;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #4b5563;
    margin-bottom: 16px;
  }}

  .section-label::before {{
    content: "";
    display: inline-block;
    width: 4px;
    height: 14px;
    background: #3b82f6;
    border-radius: 2px;
    margin-right: 8px;
  }}


  /* ============================================================
     5. MODULE: KEY SENTENCES (Say This)
     ============================================================ */
  .say-list {{
    display: flex;
    flex-direction: column;
    gap: 12px;
  }}

  .say-item {{
    background: #eff6ff;
    border-left: 4px solid #3b82f6;
    border-radius: 0 8px 8px 0;
    padding: 14px 16px;
    position: relative;
    break-inside: avoid;
    page-break-inside: avoid;
  }}

  .say-en {{
    font-size: 16px;
    font-weight: 700;
    color: #1e3a8a;
    margin-bottom: 4px;
  }}

  .say-cn {{
    font-size: 13px;
    color: #6b7280;
  }}


  /* ============================================================
     6. MODULE: VOCABULARY GRID
     ============================================================ */
  .keyword-grid {{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }}

  .keyword-item {{
    background: #ffffff;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    padding: 14px;
    transition: box-shadow 0.2s;
    break-inside: avoid;
    page-break-inside: avoid;
  }}

  .keyword-header {{
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 6px;
  }}

  .keyword-word {{
    font-size: 16px;
    font-weight: 800;
    color: #111827;
  }}

  .keyword-pos {{
    font-size: 12px;
    color: #ef4444; /* Part of speech in red */
    font-style: italic;
  }}

  .keyword-meaning {{
    font-size: 13px;
    color: #4b5563;
    margin-bottom: 8px;
    font-weight: 500;
  }}

  .keyword-example {{
    font-size: 12px;
    color: #9ca3af;
    background: #f9fafb;
    padding: 6px 8px;
    border-radius: 6px;
  }}


  /* ============================================================
     7. MODULE: GRAMMAR / PATTERN
     ============================================================ */
  .pattern-block {{
    background: #f0fdf4;
    border: 1px solid #bbf7d0;
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 12px;
    break-inside: avoid;
    page-break-inside: avoid;
  }}

  .pattern-formula {{
    font-family: monospace;
    font-size: 15px;
    color: #166534;
    font-weight: bold;
    background: #dcfce7;
    padding: 4px 8px;
    border-radius: 6px;
    display: inline-block;
    margin-bottom: 8px;
  }}

  .pattern-desc {{
    font-size: 13px;
    color: #374151;
    line-height: 1.6;
  }}


  /* ============================================================
     8. PRINT OVERRIDES
     ============================================================ */
  @media print {{
    body {{ background: white; padding: 0; }}
    .card {{ box-shadow: none; margin: 0; border-radius: 0; border: none; }}
  }}

</style>
</head>
<body>


<!-- ============================================================
     CARD
     ============================================================ -->
<div class="card">

  <!-- Header -->
  <div class="card-header">
    <img src="{logo_uri}" alt="Logo" class="logo-img">
    <div class="card-meta">{level_meta} &bull; {lesson_code}</div>
    <div class="card-title">{title}</div>
    <div class="card-goal">&#127919; {goal_statement}</div>
  </div>

  <!-- Sections (injected by renderer) -->
  {content_blocks}

</div>


</body>
</html>
