<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{unit_code} — Unit Milestone Review</title>
<style>

  /* ============================================================
     1. BASE
     ============================================================ */
  * {{ box-sizing: border-box; margin: 0; padding: 0; }}
  ul {{ list-style: none; }}

  body {{
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: #f5f3ff;
    padding: 32px 24px;
    color: #1f2937;
  }}


  /* ============================================================
     2. CARD SHELL
     ============================================================ */
  .unit-card {{
    width: 720px;
    max-width: 100%;
    margin: 0 auto;
    background: #ffffff;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 12px 30px -5px rgba(76, 29, 149, 0.15);
    border-top: 6px solid #6d28d9;
    page-break-after: always;
  }}


  /* ============================================================
     3. HEADER
     ============================================================ */
  .unit-header {{
    background: #ffffff;
    padding: 32px 32px 24px;
    text-align: center;
    border-bottom: 2px dashed #e5e7eb;
    position: relative;
  }}

  .logo-img {{
    position: absolute;
    top: 24px;
    right: 32px;
    height: 32px;
  }}

  .unit-meta {{
    font-size: 12px;
    color: #7c3aed;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }}

  .unit-title {{
    font-size: 28px;
    font-weight: 900;
    color: #111827;
    margin-bottom: 12px;
  }}

  .unit-achievements {{
    display: inline-flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }}

  .achievement-badge {{
    background: #f5f3ff;
    color: #5b21b6;
    border: 1px solid #ddd6fe;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }}


  /* ============================================================
     4. SECTION SHELL
     ============================================================ */
  .section {{
    padding: 24px 32px;
    position: relative;
  }}

  .section::after {{
    content: "";
    position: absolute;
    bottom: 0;
    left: 32px;
    right: 32px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #8b5cf6, transparent);
  }}

  .section:last-child::after {{ display: none; }}

  /* List items in plain <ul>: blank line between each */
  .section > ul:not([class]) > li {{
    margin-bottom: 20px;
  }}
  .section > ul:not([class]) > li:last-child {{
    margin-bottom: 0;
  }}

  .section-title {{
    font-size: 18px;
    font-weight: 800;
    color: #4c1d95;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }}

  .section-label {{
    display: flex;
    align-items: center;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #4b5563;
    margin-bottom: 16px;
    page-break-after: avoid;
  }}

  .section-label::before {{
    content: "";
    display: inline-block;
    width: 4px;
    height: 14px;
    background: #8b5cf6;
    border-radius: 2px;
    margin-right: 8px;
  }}


  /* ============================================================
     5. MODULE: ACHIEVEMENT SUMMARY (Unlock List)
     ============================================================ */
  .unlock-list {{
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
  }}

  .unlock-item {{
    display: flex;
    align-items: center;
    gap: 8px;
    background: #f5f3ff;
    border: 1px solid #ddd6fe;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    color: #5b21b6;
    font-weight: 600;
    break-inside: avoid;
    page-break-inside: avoid;
  }}


  /* ============================================================
     6. MODULE: KEY SENTENCES (Say This)
     ============================================================ */
  .say-list {{
    display: flex;
    flex-direction: column;
    gap: 12px;
  }}

  .say-item {{
    background: #f5f3ff;
    border-left: 4px solid #8b5cf6;
    border-radius: 0 8px 8px 0;
    padding: 14px 16px;
    position: relative;
    break-inside: avoid;
    page-break-inside: avoid;
  }}

  .say-en {{
    font-size: 16px;
    font-weight: 700;
    color: #5b21b6;
    margin-bottom: 4px;
  }}

  .say-cn {{
    font-size: 13px;
    color: #6b7280;
  }}


  /* ============================================================
     6. MODULE: VOCABULARY GRID
     ============================================================ */
  .unit-word-grid {{
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }}

  .unit-word-item {{
    border-bottom: 1px solid #f3f4f6;
    padding-bottom: 8px;
    break-inside: avoid;
    page-break-inside: avoid;
  }}

  .u-word {{
    font-size: 15px;
    font-weight: bold;
    color: #1f2937;
    display: block;
  }}

  .u-mean {{
    font-size: 12px;
    color: #6b7280;
  }}


  /* ============================================================
     6a. MODULE: KEYWORD GRID (2-column, lesson-style)
     ============================================================ */
  .keyword-grid {{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }}

  .keyword-item {{
    background: #ffffff;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    padding: 14px;
    transition: box-shadow 0.2s;
    break-inside: avoid;
    page-break-inside: avoid;
  }}

  .keyword-header {{
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 6px;
  }}

  .keyword-word {{
    font-size: 16px;
    font-weight: 800;
    color: #111827;
  }}

  .keyword-pos {{
    font-size: 12px;
    color: #ef4444;
    font-style: italic;
  }}

  .keyword-meaning {{
    font-size: 13px;
    color: #4b5563;
    margin-bottom: 8px;
    font-weight: 500;
  }}

  .keyword-example {{
    font-size: 12px;
    color: #9ca3af;
    background: #f9fafb;
    padding: 6px 8px;
    border-radius: 6px;
  }}


  /* ============================================================
     6b. MODULE: GRAMMAR / PATTERN BLOCK
     ============================================================ */
  .pattern-block {{
    background: #f5f3ff;
    border: 1px solid #ddd6fe;
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 12px;
    break-inside: avoid;
    page-break-inside: avoid;
  }}

  .pattern-formula {{
    font-family: monospace;
    font-size: 15px;
    color: #5b21b6;
    font-weight: bold;
    background: #ede9fe;
    padding: 4px 8px;
    border-radius: 6px;
    display: inline-block;
    margin-bottom: 8px;
  }}

  .pattern-desc {{
    font-size: 13px;
    color: #374151;
    line-height: 1.6;
  }}


  /* ============================================================
     6c. MODULE: QUICK REVIEW & TIPS (Chips)
     ============================================================ */
  .review-list {{
    list-style: none;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }}

  .review-chip {{
    background: #f5f3ff;
    border: 1px solid #ddd6fe;
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    color: #5b21b6;
    font-weight: 600;
    break-inside: avoid;
    page-break-inside: avoid;
  }}


  /* ============================================================
     7. MODULE: LESSON BREAKDOWN
     ============================================================ */
  .lesson-block {{
    background: #f9fafb;
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 16px;
    border-left: 4px solid #8b5cf6;
    break-inside: avoid;
    page-break-inside: avoid;
  }}

  .lesson-header {{
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }}

  .lesson-name {{
    font-size: 15px;
    font-weight: 700;
    color: #374151;
  }}

  .lesson-tag {{
    font-size: 11px;
    background: #e5e7eb;
    padding: 2px 8px;
    border-radius: 12px;
    color: #4b5563;
  }}


  /* ============================================================
     7. MODULE: GRAMMAR / MASTER SYNTAX
     ============================================================ */
  .master-syntax {{
    background: #fffbeb;
    border: 1px solid #fde68a;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 14px;
    color: #92400e;
    margin-top: 8px;
    break-inside: avoid;
    page-break-inside: avoid;
  }}

  .master-syntax strong {{
    color: #b45309;
    display: block;
    margin-bottom: 4px;
  }}


  /* ============================================================
     8. PRINT OVERRIDES
     ============================================================ */
  @media print {{
    body {{ background: white; padding: 0; }}
    .unit-card {{ box-shadow: none; margin: 0; border: none; border-top: 4px solid #6d28d9; }}
  }}

</style>
</head>
<body>


<!-- ============================================================
     CARD
     ============================================================ -->
<div class="unit-card">

  <!-- Header -->
  <div class="unit-header">
    <img src="{logo_uri}" alt="Logo" class="logo-img">
    <div class="unit-meta">Unit {unit_number} Summary</div>
    <div class="unit-title">{unit_title}</div>
    <div class="unit-achievements">
      <span class="achievement-badge">&#128640; +{word_count} Words</span>
      <span class="achievement-badge">&#128483; {topic_count} Topics</span>
      <span class="achievement-badge">&#10024; {grammar_count} Grammar</span>
    </div>
  </div>

  <!-- Sections (injected by renderer) -->
  {content_blocks}

</div>


</body>
</html>
